name: Build Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend
        run: |
          npm ci || npm install --legacy-peer-deps
          npm run build

      - name: Build backend
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o server ./cmd/server

      - name: Package tarball
        run: |
          mkdir -p video-site-91-linux-amd64
          cp backend/server video-site-91-linux-amd64/
          cp backend/config.example.yaml video-site-91-linux-amd64/
          cp -R dist video-site-91-linux-amd64/dist
          [ -f install.sh ] && cp install.sh video-site-91-linux-amd64/ || true
          tar -czf video-site-91-linux-amd64.tar.gz video-site-91-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-site-91-linux-amd64
          path: video-site-91-linux-amd64.tar.gz

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "custom-build" --yes 2>/dev/null || true
          gh release create "custom-build" video-site-91-linux-amd64.tar.gz --title "Custom Build (WebDAV + MetaTube)" --notes "Pre-built release with WebDAV driver, .strm support, 302 redirect, and MetaTube scraper." --latest

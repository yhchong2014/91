# backend 配置示例。首次启动若未发现 config.yaml，会基于此文件自动创建。
server:
  # 本地开发默认配合 vite.config.ts 的代理端口。
  listen: "127.0.0.1:9192"
  # 管理后台用户。保留默认值时，首次访问登录页会要求设置新用户名和密码，
  # 并写回 backend/config.yaml。
  # CORS 白名单：允许跨源访问的前端 Origin 列表。默认空 = 不允许任何跨源请求。
  # 同源部署（前后端在同一域名 + 端口下，由 nginx 反代）不需要配此项。
  # 仅在前后端分别部署在不同域名/端口、且需要前端 fetch 后端时填写。
  # 不要写 "*"；带 cookie 的 CORS 必须列具体 Origin。
  # 示例：
  # allowed_origins:
  #   - "https://video.example.com"
  #   - "http://127.0.0.1:9191"
  allowed_origins: []

storage:
  # SQLite 数据库文件路径
  db_path: "./data/video-site.db"
  # 本地预览视频和封面目录
  local_preview_dir: "./data/previews"

scanner:
  # 已废弃：旧版的"每天 02:00-07:00 按 IntervalSeconds 间隔重复扫盘"已被移除。
  # 现在所有定时任务统一由 nightly 块控制（每天 01:00 跑一条完整流水线）。
  # 字段保留仅为兼容旧 yaml，运行时被忽略。
  interval_seconds: 0
  # 单次扫描每家网盘目录递归层数上限
  max_depth: 5
  # 被扫描的扩展名
  video_extensions: [".mp4", ".mkv", ".mov", ".webm", ".avi", ".strm"]

nightly:
  # 凌晨流水线触发整点，默认 1 即每天 01:00；需要改时间直接改这个值。
  # 运行时会统一编排扫描、媒体资产生成和后续清理任务。
  cron_hour: 1

preview:
  # 是否启用 ffmpeg 抽帧生成预览视频
  enabled: true
  # ffmpeg / ffprobe 可执行文件名或绝对路径
  ffmpeg_path: "ffmpeg"
  ffprobe_path: "ffprobe"
  # 预览视频每段时长（秒），实际生成时每段最多 3 秒
  duration_seconds: 3
  # 兼容旧配置；当前 30 秒以下最多 3 段，30 秒及以上固定 4 段
  segments: 3
  # 预览视频宽度
  width: 480

# 盘列表。上线后请通过管理后台添加，本文件可留空。
# kind 支持 quark / p115 / p123 / pikpak / wopan / guangyapan / onedrive / googledrive / localstorage / webdav。
#
# OneDrive 示例：
# - id: "my-onedrive"
#   kind: "onedrive"
#   name: "我的 OneDrive"
#   root_id: "root"
#   params:
#     refresh_token: "..."
#
# Google Drive 示例：
# - id: "my-google"
#   kind: "googledrive"
#   name: "我的 Google Drive"
#   root_id: "root"
#   params:
#     refresh_token: "..."
#     client_id: "..."
#     client_secret: "..."
#
# 光鸭网盘示例：
# - id: "my-guangyapan"
#   kind: "guangyapan"
#   name: "我的光鸭网盘"
#   # 留空表示光鸭网盘根目录；也可以填写光鸭目录 fileId
#   root_id: ""
#   params:
#     # 推荐在后台使用扫码登录自动写入 access_token / refresh_token。
#     refresh_token: "..."
#     # 可选：按路径解析扫描根目录，优先于 root_id
#     # root_path: "影视/电影"
#
# 本地存储示例：
# - id: "local-media"
#   kind: "localstorage"
#   name: "本地视频目录"
#   root_id: "/"
#   params:
#     # Docker 部署时这里和 .strm 里的绝对路径都必须使用容器内路径。
#     # 例如宿主机 /mnt/videos 挂载为 /media，就填写 /media。
#     path: "/mnt/videos"
#
# WebDAV 示例（Alist / Nextcloud / rclone serve webdav 等，支持 .strm 文件）：
# 播放时后端自动 302 重定向到 WebDAV 服务器的直链或 CDN，视频流量不经过后端。
# .strm 文件会被自动下载并解析其中的 HTTP/HTTPS URL 作为播放地址。
# - id: "my-webdav"
#   kind: "webdav"
#   name: "我的 WebDAV"
#   root_id: "/"
#   params:
#     # WebDAV 服务器地址（必填）
#     address: "https://dav.example.com/dav"
#     # WebDAV 用户名
#     username: "user"
#     # WebDAV 密码
#     password: "pass"
#     # WebDAV 根路径，默认 "/"。可指定子目录只扫描该目录下的内容。
#     root_path: "/videos"
#     # 是否跳过 TLS 证书验证（自签名证书时设为 "true"）
#     tls_insecure_skip_verify: "false"
drives: []

# MetaTube 元数据刮削（需要自建 MetaTube 后端）。
# 启用后，扫描到新视频时会自动根据文件名提取番号（如 ABP-123），
# 向 MetaTube 后端查询元数据（标题、演员、标签、封面等）并写入视频库。
# MetaTube 后端项目：https://github.com/metatube-community/metatube-sdk-go
# Jellyfin 插件：https://github.com/metatube-community/jellyfin-plugin-metatube
metatube:
  # 是否启用 MetaTube 刮削
  enabled: false
  # MetaTube 后端地址（必填）
  server_url: "http://127.0.0.1:8080"
  # 可选：MetaTube API 认证令牌，留空表示无认证
  token: ""
